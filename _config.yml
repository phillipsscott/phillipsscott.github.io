title: MM
email: null
description: >-
  Write an awesome description for your new site here. You can edit this line in
  _config.yml. It will appear in your document head meta (for Google search
  results) and in your feed.xml site description.
twitter_username: username
github_username: username
minimal_mistakes_skin: default
search: true
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
permalink: '/:categories/:title/'
paginate: 5
paginate_path: '/page:num/'
timezone: null
include:
  - _pages
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
author:
  name: Scott Phillips
  avatar: /assets/images/bio-photo.jpg
  bio: >-
    I'm a guy that is interesting in lots of different things. I thought I'd
    build this site to share some of them!
  links:
    - label: Twitter
      icon: fab fa-fw fa-twitter-square
      url: 'https://twitter.com/ScottPhillyps'
    - label: GitHub
      icon: fab fa-fw fa-github
      url: 'https://github.com/phillipsscott'
footer:
  links:
    - label: Twitter
      icon: fab fa-fw fa-twitter-square
      url: 'https://twitter.com/'
    - label: GitHub
      icon: fab fa-fw fa-github
      url: 'https://github.com/'
    - label: Instagram
      icon: fab fa-fw fa-instagram
      url: 'https://instagram.com/'
defaults:
  - scope:
      path: ''
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: _pages
      type: pages
    values:
      layout: single
      author_profile: true
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
